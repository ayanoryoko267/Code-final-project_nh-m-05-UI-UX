<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wearever - Cửa hàng thời trang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fira Sans", sans-serif;
      }
      html {
        scroll-behavior: smooth;
      }
      .filter-size.selected {
        background-color: #422b1c;
        color: white;
        border-color: #422b1c;
      }
      .filter-color.selected {
        outline: 2px solid #422b1c;
        outline-offset: 2px;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>

  <body class="bg-white text-[#422B1C] overflow-x-hidden relative">
    <header
      class="border-b border-gray-100 shadow-sm sticky top-0 bg-white/95 backdrop-blur-sm z-50"
    >
      <div
        class="container mx-auto px-3 py-3 md:px-4 md:py-4 flex flex-wrap items-center justify-between gap-y-3"
      >
        <div
          class="order-1 md:order-2 flex-shrink-0 w-1/2 md:w-1/3 flex justify-start md:justify-center"
        >
          <div
            class="w-10 h-10 md:w-12 md:h-12 border-2 border-[#422B1C] rounded-full flex items-center justify-center font-bold text-xs md:text-base"
          >
            Logo
          </div>
        </div>

        <div
          class="order-2 md:order-3 flex items-center justify-end space-x-4 md:space-x-6 w-1/2 md:w-1/3"
        >
          <div class="relative hidden sm:block">
            <input
              type="text"
              placeholder="Tìm kiếm sản phẩm"
              class="border border-[#422B1C]/30 rounded-full py-1 px-4 pl-10 focus:outline-none focus:border-[#422B1C] w-48 lg:w-64 text-sm font-normal italic transition-colors"
            />
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-[#422B1C]/60"
            ></i>
          </div>
          <button class="sm:hidden text-[#422B1C]">
            <i class="fa-solid fa-magnifying-glass text-lg"></i>
          </button>

          <a
            href="#"
            class="flex items-center space-x-1 hover:opacity-70 transition-opacity"
          >
            <span class="font-normal hidden md:inline">Tài khoản</span
            ><i class="fa-regular fa-circle-user text-xl md:text-2xl"></i>
          </a>

          <a
            href="cart.html"
            class="relative hover:opacity-70 transition-opacity flex items-center space-x-1"
          >
            <span class="font-normal hidden md:inline">Giỏ hàng</span
            ><i class="fa-solid fa-cart-shopping text-xl md:text-2xl"></i>
            <span
              id="global-cart-badge"
              class="absolute -top-2 -right-2 bg-[#7a0000] text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center transition-transform duration-300"
              >0</span
            >
          </a>
        </div>

        <nav
          class="order-3 md:order-1 flex space-x-5 md:space-x-8 font-semibold items-center overflow-x-auto scrollbar-hide md:overflow-visible w-full md:w-1/3 text-sm md:text-base pb-1 md:pb-0"
        >
          <a
            href="shop.html"
            class="hover:opacity-70 py-2 whitespace-nowrap transition-opacity"
            >Về Wearever</a
          >
          <div class="relative group py-2 whitespace-nowrap">
            <a
              href="#"
              class="hover:opacity-70 cursor-pointer transition-opacity"
              >Áo</a
            >
            <div
              class="absolute top-full left-0 pt-2 hidden group-hover:block z-50"
            >
              <div
                class="bg-white border border-gray-100 shadow-[0_4px_20px_rgba(0,0,0,0.05)] rounded-md w-40 overflow-hidden"
              >
                <a
                  href="javascript:void(0)"
                  onclick="goToCategory('áo thun')"
                  class="block px-4 py-2.5 text-sm font-normal hover:bg-[#422B1C] hover:text-white transition-colors"
                  >Áo thun</a
                >
                <a
                  href="javascript:void(0)"
                  onclick="goToCategory('áo sơ mi')"
                  class="block px-4 py-2.5 text-sm font-normal hover:bg-[#422B1C] hover:text-white transition-colors"
                  >Áo sơ mi</a
                >
                <a
                  href="javascript:void(0)"
                  onclick="goToCategory('áo len')"
                  class="block px-4 py-2.5 text-sm font-normal hover:bg-[#422B1C] hover:text-white transition-colors"
                  >Áo len</a
                >
                <a
                  href="javascript:void(0)"
                  onclick="goToCategory('áo tanktop')"
                  class="block px-4 py-2.5 text-sm font-normal hover:bg-[#422B1C] hover:text-white transition-colors"
                  >Áo tanktop</a
                >
              </div>
            </div>
          </div>

          <div class="relative group py-2 whitespace-nowrap">
            <a
              href="#"
              class="hover:opacity-70 cursor-pointer transition-opacity"
              >Quần</a
            >
            <div
              class="absolute top-full left-0 pt-2 hidden group-hover:block z-50"
            >
              <div
                class="bg-white border border-gray-100 shadow-[0_4px_20px_rgba(0,0,0,0.05)] rounded-md w-40 overflow-hidden"
              >
                <a
                  href="javascript:void(0)"
                  onclick="goToCategory('quần jeans')"
                  class="block px-4 py-2.5 text-sm font-normal hover:bg-[#422B1C] hover:text-white transition-colors"
                  >Quần jeans</a
                >
                <a
                  href="javascript:void(0)"
                  onclick="goToCategory('quần tây')"
                  class="block px-4 py-2.5 text-sm font-normal hover:bg-[#422B1C] hover:text-white transition-colors"
                  >Quần tây</a
                >
                <a
                  href="javascript:void(0)"
                  onclick="goToCategory('quần kaki')"
                  class="block px-4 py-2.5 text-sm font-normal hover:bg-[#422B1C] hover:text-white transition-colors"
                  >Quần kaki</a
                >
                <a
                  href="javascript:void(0)"
                  onclick="goToCategory('quần nỉ')"
                  class="block px-4 py-2.5 text-sm font-normal hover:bg-[#422B1C] hover:text-white transition-colors"
                  >Quần nỉ</a
                >
              </div>
            </div>
          </div>

          <div class="relative group py-2 whitespace-nowrap">
            <a
              href="#"
              class="hover:opacity-70 cursor-pointer transition-opacity"
              >Bộ sưu tập</a
            >
            <div
              class="absolute top-full left-0 pt-2 hidden group-hover:block z-50"
            >
              <div
                class="bg-white border border-gray-100 shadow-[0_4px_20px_rgba(0,0,0,0.05)] rounded-md w-48 overflow-hidden"
              >
                <a
                  href="bst1.html"
                  class="block px-4 py-2.5 text-sm font-normal hover:bg-[#422B1C] hover:text-white transition-colors"
                  >SHE'S VIETNAMESE</a
                >
                <a
                  href="bst2.html"
                  class="block px-4 py-2.5 text-sm font-normal hover:bg-[#422B1C] hover:text-white transition-colors"
                  >SUMMER HER</a
                >
              </div>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main class="container mx-auto px-2 md:px-4 py-4 md:py-6">
      <div class="flex flex-col mb-4 md:mb-6">
        <nav
          class="flex items-center space-x-2 md:space-x-3 text-xs md:text-sm mb-4"
          id="dynamic-breadcrumb"
        ></nav>

        <button
          id="toggle-filter-btn"
          class="focus:outline-none hover:bg-[#d2c8be]/30 transition-colors flex items-center space-x-2 w-fit bg-gray-50 border border-gray-200 px-4 py-2 rounded-full shadow-sm"
          title="Đóng/Mở bảng bộ lọc"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#422B1C"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="4" y1="21" x2="4" y2="14"></line>
            <line x1="4" y1="10" x2="4" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12" y2="3"></line>
            <line x1="20" y1="21" x2="20" y2="16"></line>
            <line x1="20" y1="12" x2="20" y2="3"></line>
            <line x1="1" y1="14" x2="7" y2="14"></line>
            <line x1="9" y1="8" x2="15" y2="8"></line>
            <line x1="17" y1="16" x2="23" y2="16"></line>
          </svg>
          <span class="font-medium text-sm">Bộ lọc</span>
        </button>
      </div>

      <div
        class="flex flex-col md:flex-row gap-5 md:gap-8 transition-all duration-300"
      >
        <aside
          id="filter-sidebar"
          class="w-full md:w-1/4 bg-white border border-gray-200 shadow-[0_4px_25px_rgba(0,0,0,0.06)] rounded-2xl md:rounded-[2rem] p-5 md:p-8 h-fit md:sticky md:top-28 transition-all duration-300"
        >
          <div class="mb-6 md:mb-8">
            <h3 class="font-bold mb-3 md:mb-4 text-sm md:text-lg">
              Kích thước
            </h3>
            <div class="flex flex-wrap gap-2 md:gap-3" id="size-filters">
              <button
                class="filter-size w-9 h-9 md:w-11 md:h-11 text-xs md:text-base border border-[#422B1C]/30 flex items-center justify-center hover:bg-[#422B1C] hover:border-[#422B1C] hover:text-white transition rounded-sm"
                data-size="XS"
              >
                XS
              </button>
              <button
                class="filter-size w-9 h-9 md:w-11 md:h-11 text-xs md:text-base border border-[#422B1C]/30 flex items-center justify-center hover:bg-[#422B1C] hover:border-[#422B1C] hover:text-white transition rounded-sm"
                data-size="S"
              >
                S
              </button>
              <button
                class="filter-size w-9 h-9 md:w-11 md:h-11 text-xs md:text-base border border-[#422B1C]/30 flex items-center justify-center hover:bg-[#422B1C] hover:border-[#422B1C] hover:text-white transition rounded-sm"
                data-size="M"
              >
                M
              </button>
              <button
                class="filter-size w-9 h-9 md:w-11 md:h-11 text-xs md:text-base border border-[#422B1C]/30 flex items-center justify-center hover:bg-[#422B1C] hover:border-[#422B1C] hover:text-white transition rounded-sm"
                data-size="L"
              >
                L
              </button>
              <button
                class="filter-size w-9 h-9 md:w-11 md:h-11 text-xs md:text-base border border-[#422B1C]/30 flex items-center justify-center hover:bg-[#422B1C] hover:border-[#422B1C] hover:text-white transition rounded-sm"
                data-size="XL"
              >
                XL
              </button>
            </div>
          </div>
          <div class="mb-6 md:mb-8">
            <h3 class="font-bold mb-3 md:mb-4 text-sm md:text-lg">Màu sắc</h3>
            <div class="flex flex-wrap gap-3 md:gap-4" id="color-filters">
              <div
                class="filter-color w-7 h-7 md:w-10 md:h-10 rounded-full bg-[#ffffff] border border-gray-300 cursor-pointer shadow-sm hover:scale-110 transition-transform"
                data-color="trắng"
                title="Trắng"
              ></div>
              <div
                class="filter-color w-7 h-7 md:w-10 md:h-10 rounded-full bg-[#EED9B9] border border-gray-200 cursor-pointer shadow-sm hover:scale-110 transition-transform"
                data-color="be"
                title="Be"
              ></div>
              <div
                class="filter-color w-7 h-7 md:w-10 md:h-10 rounded-full bg-[#263B6A] cursor-pointer shadow-sm hover:scale-110 transition-transform"
                data-color="xanh dương"
                title="Xanh dương"
              ></div>
              <div
                class="filter-color w-7 h-7 md:w-10 md:h-10 rounded-full bg-[#d2c8be] cursor-pointer shadow-sm hover:scale-110 transition-transform"
                data-color="xám"
                title="Xám"
              ></div>
              <div
                class="filter-color w-7 h-7 md:w-10 md:h-10 rounded-full bg-[#000000] cursor-pointer shadow-sm hover:scale-110 transition-transform"
                data-color="đen"
                title="Đen"
              ></div>
            </div>
          </div>
          <div>
            <h3 class="font-bold mb-3 md:mb-4 text-sm md:text-lg">Mức giá</h3>
            <div class="space-y-3 md:space-y-4" id="price-filters">
              <label
                class="flex items-center space-x-2 md:space-x-3 cursor-pointer group"
              >
                <input
                  type="checkbox"
                  class="filter-price w-4 h-4 md:w-5 md:h-5 accent-[#422B1C] border-gray-300 rounded cursor-pointer"
                  data-min="100000"
                  data-max="200000"
                />
                <span
                  class="text-xs md:text-base group-hover:opacity-70 transition-opacity"
                  >100.000 - 200.000 đồng</span
                >
              </label>
              <label
                class="flex items-center space-x-2 md:space-x-3 cursor-pointer group"
              >
                <input
                  type="checkbox"
                  class="filter-price w-4 h-4 md:w-5 md:h-5 accent-[#422B1C] border-gray-300 rounded cursor-pointer"
                  data-min="200000"
                  data-max="300000"
                />
                <span
                  class="text-xs md:text-base group-hover:opacity-70 transition-opacity"
                  >200.000 - 300.000 đồng</span
                >
              </label>
              <label
                class="flex items-center space-x-2 md:space-x-3 cursor-pointer group"
              >
                <input
                  type="checkbox"
                  class="filter-price w-4 h-4 md:w-5 md:h-5 accent-[#422B1C] border-gray-300 rounded cursor-pointer"
                  data-min="300000"
                  data-max="99999999"
                />
                <span
                  class="text-xs md:text-base group-hover:opacity-70 transition-opacity"
                  >Trên 300.000 đồng</span
                >
              </label>
            </div>
          </div>
        </aside>

        <section
          id="product-section"
          class="w-full md:w-3/4 mx-auto transition-all duration-300"
        >
          <div
            id="product-grid"
            class="grid grid-cols-3 gap-1.5 md:gap-x-6 md:gap-y-10"
          ></div>
          <div
            id="no-products-msg"
            class="hidden text-center text-[#422B1C]/60 py-10 w-full text-sm md:text-base"
          >
            Không tìm thấy sản phẩm nào phù hợp với bộ lọc của bạn.
          </div>
        </section>
      </div>
    </main>

    <div
      id="quick-buy-modal"
      class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 p-4 transition-opacity duration-300 opacity-0"
      onclick="closeQuickBuy()"
    >
      <div
        class="relative w-full max-w-sm bg-white rounded-xl p-5 shadow-2xl transform transition-transform duration-300 scale-95"
        id="quick-buy-content"
        onclick="event.stopPropagation()"
      ></div>
    </div>

    <footer class="border-t border-gray-100 mt-12 md:mt-16 bg-gray-50/50">
      <div
        class="container mx-auto px-4 py-8 md:py-12 text-center text-[#422B1C]/60 text-xs md:text-sm"
      >
        <p>&copy; 2026 Wearever. All rights reserved.</p>
      </div>
    </footer>

    <button
      id="backToTopBtn"
      onclick="scrollToTop()"
      class="fixed bottom-4 right-4 md:bottom-6 md:right-6 w-10 h-10 md:w-12 md:h-12 bg-[#422B1C] text-white rounded-full flex items-center justify-center shadow-lg transition-all duration-300 opacity-0 translate-y-10 hover:bg-[#2c1d12] z-50"
    >
      <i class="fa-solid fa-chevron-up text-sm md:text-lg"></i>
    </button>

    <script>
      let allProducts = [];
      let activeCategory = new URLSearchParams(window.location.search).get(
        "category",
      );

      // --- CẬP NHẬT GIỎ HÀNG TOÀN CỤC (LOCAL STORAGE) ---
      function updateGlobalCartBadge() {
        let currentCount =
          parseInt(localStorage.getItem("wearever_cart_count")) || 0;
        const badge = document.getElementById("global-cart-badge");
        if (badge) {
          badge.textContent = currentCount;
          badge.classList.add("scale-150");
          setTimeout(() => badge.classList.remove("scale-150"), 300);
        }
      }

      document
        .getElementById("toggle-filter-btn")
        .addEventListener("click", function () {
          const sidebar = document.getElementById("filter-sidebar");
          const productSection = document.getElementById("product-section");
          sidebar.classList.toggle("hidden");
          if (sidebar.classList.contains("hidden")) {
            productSection.classList.remove("md:w-3/4");
            productSection.classList.add("md:w-full");
          } else {
            productSection.classList.remove("md:w-full");
            productSection.classList.add("md:w-3/4");
          }
        });

      window.goToCategory = function (cat) {
        document
          .querySelectorAll(".filter-size.selected")
          .forEach((el) => el.classList.remove("selected"));
        document
          .querySelectorAll(".filter-color.selected")
          .forEach((el) => el.classList.remove("selected"));
        document
          .querySelectorAll(".filter-price:checked")
          .forEach((el) => (el.checked = false));

        activeCategory = cat;

        if (cat) {
          const newUrl =
            window.location.pathname + "?category=" + encodeURIComponent(cat);
          window.history.pushState({ path: newUrl }, "", newUrl);
        } else {
          window.history.pushState(
            { path: window.location.pathname },
            "",
            window.location.pathname,
          );
        }

        updateBreadcrumb();
        applyFilters();
      };

      function updateBreadcrumb() {
        const breadcrumbContainer =
          document.getElementById("dynamic-breadcrumb");
        const categoryMap = {
          "áo thun": { parent: "Áo", parentId: "áo", name: "Áo thun" },
          "áo sơ mi": { parent: "Áo", parentId: "áo", name: "Áo sơ mi" },
          "áo len": { parent: "Áo", parentId: "áo", name: "Áo len" },
          "áo tanktop": { parent: "Áo", parentId: "áo", name: "Áo tanktop" },
          "quần jeans": {
            parent: "Quần",
            parentId: "quần",
            name: "Quần jeans",
          },
          "quần tây": { parent: "Quần", parentId: "quần", name: "Quần tây" },
          "quần kaki": { parent: "Quần", parentId: "quần", name: "Quần kaki" },
          "quần nỉ": { parent: "Quần", parentId: "quần", name: "Quần nỉ" },
          áo: { name: "Tất cả Áo" },
          quần: { name: "Tất cả Quần" },
        };

        if (activeCategory) {
          const lowerCat = activeCategory.toLowerCase();
          const catInfo = categoryMap[lowerCat];

          if (catInfo && catInfo.parent) {
            breadcrumbContainer.innerHTML = `
                  <a href="index.html" class="hover:opacity-70 transition-opacity">Trang chủ</a>
                  <span class="text-[#422B1C]/40">|</span>
                  <a href="javascript:void(0)" onclick="goToCategory('${catInfo.parentId}')" class="hover:opacity-70 transition-opacity font-medium cursor-pointer">${catInfo.parent}</a>
                  <span class="text-[#422B1C]/40">|</span>
                  <span class="bg-[#d2c8be] px-2 md:px-3 py-1 rounded font-medium">${catInfo.name}</span>
              `;
          } else {
            const displayName = catInfo
              ? catInfo.name
              : activeCategory.charAt(0).toUpperCase() +
                activeCategory.slice(1);
            breadcrumbContainer.innerHTML = `
                  <a href="index.html" class="hover:opacity-70 transition-opacity">Trang chủ</a>
                  <span class="text-[#422B1C]/40">|</span>
                  <span class="bg-[#d2c8be] px-2 md:px-3 py-1 rounded font-medium">${displayName}</span>
              `;
          }
        } else {
          breadcrumbContainer.innerHTML = `
                <a href="index.html" class="hover:opacity-70 transition-opacity">Trang chủ</a>
                <span class="text-[#422B1C]/40">|</span>
                <span class="bg-[#d2c8be] px-2 md:px-3 py-1 rounded font-medium">Tất cả sản phẩm</span>
            `;
        }
      }

      async function fetchProducts() {
        try {
          const response = await fetch("product.json");
          allProducts = await response.json();
          updateBreadcrumb();
          applyFilters();
        } catch (error) {
          console.error("Lỗi tải JSON:", error);
          document.getElementById("product-grid").innerHTML =
            '<p class="text-red-500 col-span-3 text-center text-sm md:text-base">Không thể tải dữ liệu sản phẩm.</p>';
        }
      }

      function applyFilters() {
        const selectedSizes = Array.from(
          document.querySelectorAll(".filter-size.selected"),
        ).map((btn) => btn.dataset.size);
        const selectedColors = Array.from(
          document.querySelectorAll(".filter-color.selected"),
        ).map((div) => div.dataset.color);
        const selectedPriceInputs = Array.from(
          document.querySelectorAll(".filter-price:checked"),
        );

        let filteredProducts = allProducts;

        if (activeCategory) {
          const searchCat = activeCategory.toLowerCase();
          filteredProducts = filteredProducts.filter((p) => {
            if (!p.phanloai) return false;
            const spCat = p.phanloai.toLowerCase();
            if (searchCat === "áo" || searchCat === "quần") {
              return spCat.includes(searchCat);
            }
            return spCat === searchCat;
          });
        }

        if (selectedSizes.length > 0) {
          filteredProducts = filteredProducts.filter((p) => {
            if (!p.kichthuoc) return false;
            const productSizes = p.kichthuoc.split(",").map((s) => s.trim());
            return selectedSizes.some((size) => productSizes.includes(size));
          });
        }

        if (selectedColors.length > 0) {
          filteredProducts = filteredProducts.filter(
            (p) => p.mausac && selectedColors.includes(p.mausac.toLowerCase()),
          );
        }

        if (selectedPriceInputs.length > 0) {
          filteredProducts = filteredProducts.filter((p) => {
            const priceStr =
              p.giasaukhuyenmai && p.giasaukhuyenmai.trim() !== ""
                ? p.giasaukhuyenmai
                : p.dongia;
            const currentPrice = parseInt(priceStr);
            return selectedPriceInputs.some((cb) => {
              return (
                currentPrice >= parseInt(cb.dataset.min) &&
                currentPrice <= parseInt(cb.dataset.max)
              );
            });
          });
        }

        renderProducts(filteredProducts);
      }

      function renderProducts(data) {
        const grid = document.getElementById("product-grid");
        const noMsg = document.getElementById("no-products-msg");

        if (data.length === 0) {
          grid.innerHTML = "";
          noMsg.classList.remove("hidden");
          return;
        }

        noMsg.classList.add("hidden");

        grid.innerHTML = data
          .map((p) => {
            const formatPrice = (price) =>
              new Intl.NumberFormat("vi-VN").format(Number(price)) + "đ";
            const currentPrice = p.giasaukhuyenmai
              ? formatPrice(p.giasaukhuyenmai)
              : formatPrice(p.dongia);
            const hasDiscount =
              p.giasaukhuyenmai && Number(p.dongia) > Number(p.giasaukhuyenmai);
            const cardBorderStyle = hasDiscount
              ? "border-[1.5px] md:border-2 border-[#7a0000]/40"
              : "border border-[#422B1C]/10 shadow-[0_2px_10px_rgba(0,0,0,0.02)]";

            let discountBadge = "";
            if (hasDiscount) {
              const percent = Math.round(
                100 - (Number(p.giasaukhuyenmai) / Number(p.dongia)) * 100,
              );
              discountBadge = `-${percent}%`;
            }

            const imgSrc1 =
              p.linkanhsp ||
              "https://via.placeholder.com/300x400?text=Chua+co+anh";
            const imgSrc2 = p.linkanhsp_hover || imgSrc1;

            return `
                <a href="product-detail.html?id=${p.stt}" class="group relative block cursor-pointer">
                    <div class="aspect-[1/1.618] ${cardBorderStyle} rounded-md md:rounded-lg mb-1.5 md:mb-4 relative overflow-hidden bg-white transition-all duration-300">
                        <img src="${imgSrc2}" alt="${p.tensanpham} mặt sau" class="w-full h-full object-cover absolute inset-0 z-0">
                        <img src="${imgSrc1}" alt="${p.tensanpham}" class="w-full h-full object-cover absolute inset-0 z-10 transition-opacity duration-500 group-hover:opacity-0">
                        
                        <div class="absolute bottom-2 md:bottom-4 left-1/2 transform -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20">
                            <button onclick="openQuickBuy(event, '${p.stt}')" class="w-6 h-6 md:w-10 md:h-10 bg-white border border-[#422B1C] text-[#422B1C] rounded-full flex items-center justify-center hover:bg-[#422B1C] hover:text-white transition-all duration-200 hover:-translate-y-1 shadow-md">
                                <i class="fa-solid fa-cart-shopping text-[8px] md:text-sm"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="space-y-0.5 md:space-y-1.5 px-0.5">
                        <h4 class="font-medium truncate text-[9px] sm:text-[11px] md:text-base leading-tight" title="${p.tensanpham}">${p.tensanpham}</h4>
                        
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-[11px] sm:text-sm md:text-lg">${currentPrice}</span>
                            <div class="flex items-center space-x-0.5 md:space-x-1 text-[#422B1C]/60">
                                <span class="text-[10px] md:text-base">${p.danhgia}</span>
                                <i class="fa-solid fa-star text-[10px] md:text-base text-yellow-500"></i>
                            </div>
                        </div>
                        
                        ${
                          hasDiscount
                            ? `
                        <div class="flex justify-between items-center mt-0.5 md:mt-1">
                            <span class="text-[9px] md:text-sm text-[#422B1C]/40 line-through">${formatPrice(p.dongia)}</span>
                            <span class="text-[10px] md:text-[13px] bg-[#7a0000] text-white rounded px-1.5 md:px-3 py-0.5 font-medium leading-none">${discountBadge}</span>
                        </div>
                        `
                            : '<div class="h-4 md:h-7 mt-0.5 md:mt-1"></div>'
                        }
                    </div>
                </a>
            `;
          })
          .join("");
      }

      // --- LOGIC XỬ LÝ POPUP CHỌN SIZE MUA NHANH ---
      let currentQuickBuyId = null; // THÊM KHAI BÁO BIẾN Ở ĐÂY

      window.openQuickBuy = function (e, productId) {
        e.preventDefault(); // Ngăn link <a> chuyển hướng đến trang detail
        e.stopPropagation(); // Ngăn sự kiện click bị lây lan

        currentQuickBuyId = productId; // GÁN ID CỦA SẢN PHẨM KHI VỪA MỞ POPUP

        const product = allProducts.find((p) => p.stt === productId);
        if (!product) return;

        const modal = document.getElementById("quick-buy-modal");
        const content = document.getElementById("quick-buy-content");
        const sizes = product.kichthuoc
          ? product.kichthuoc.split(",").map((s) => s.trim())
          : [];

        // Render nội dung bên trong modal
        content.innerHTML = `
              <div class="flex justify-between items-center mb-3 border-b border-gray-100 pb-3">
                  <h3 class="font-bold text-lg text-[#422B1C]">Chọn kích thước</h3>
                  <button onclick="closeQuickBuy()" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
              </div>
              <p class="text-sm font-medium text-gray-700 mb-4 truncate">${product.tensanpham}</p>
              <div class="flex flex-wrap gap-3 justify-center mb-2">
                  ${sizes
                    .map(
                      (size) => `
                      <button onclick="confirmAddQuickBuy('${size}')" class="w-12 h-10 border border-[#422B1C]/40 rounded hover:border-[#422B1C] hover:bg-[#422B1C] hover:text-white transition-colors font-medium">
                          ${size}
                      </button>
                  `,
                    )
                    .join("")}
              </div>
          `;

        // Bật Modal
        modal.classList.remove("hidden");
        modal.classList.add("flex");
        setTimeout(() => {
          modal.classList.remove("opacity-0");
          content.classList.remove("scale-95");
          content.classList.add("scale-100");
        }, 10);
      };

      window.closeQuickBuy = function () {
        const modal = document.getElementById("quick-buy-modal");
        const content = document.getElementById("quick-buy-content");

        modal.classList.add("opacity-0");
        content.classList.remove("scale-100");
        content.classList.add("scale-95");

        setTimeout(() => {
          modal.classList.add("hidden");
          modal.classList.remove("flex");
        }, 300);
      };

      window.confirmAddQuickBuy = function (size) {
        if (!currentQuickBuyId) return; // Chặn lỗi nếu không có ID

        // Lấy mảng giỏ hàng từ Local Storage
        let cart =
          JSON.parse(localStorage.getItem("wearever_cart_details")) || [];

        // Kiểm tra xem áo/quần size này đã có trong giỏ chưa
        let existingItem = cart.find(
          (item) => item.id === currentQuickBuyId && item.size === size,
        );

        if (existingItem) {
          existingItem.qty += 1;
        } else {
          cart.push({
            id: currentQuickBuyId,
            size: size,
            qty: 1,
            checked: true,
          });
        }

        // Lưu lại mảng mới vào Local Storage
        localStorage.setItem("wearever_cart_details", JSON.stringify(cart));

        // Tính lại tổng số lượng và cập nhật badge đỏ trên header
        let totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
        localStorage.setItem("wearever_cart_count", totalItems);
        updateGlobalCartBadge();

        // Đóng modal
        closeQuickBuy();
      };

      // Gắn sự kiện Filters
      document.querySelectorAll(".filter-size").forEach((btn) =>
        btn.addEventListener("click", (e) => {
          e.target.classList.toggle("selected");
          applyFilters();
        }),
      );
      document.querySelectorAll(".filter-color").forEach((div) =>
        div.addEventListener("click", (e) => {
          e.target.classList.toggle("selected");
          applyFilters();
        }),
      );
      document
        .querySelectorAll(".filter-price")
        .forEach((cb) => cb.addEventListener("change", applyFilters));

      // Scroll to Top
      window.onscroll = function () {
        const btn = document.getElementById("backToTopBtn");
        if (
          document.body.scrollTop > 300 ||
          document.documentElement.scrollTop > 300
        ) {
          btn.classList.remove("opacity-0", "translate-y-10");
        } else {
          btn.classList.add("opacity-0", "translate-y-10");
        }
      };
      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Khởi chạy
      fetchProducts();
      updateGlobalCartBadge(); // Đảm bảo lúc vừa vào trang là load giỏ hàng ngay

      // ĐỒNG BỘ GIỎ HÀNG REAL-TIME GIỮA CÁC TAB
      window.addEventListener("storage", function (e) {
        // Cập nhật lại số lượng trên bong bóng đỏ
        if (e.key === "wearever_cart_count") {
          const badge = document.getElementById("global-cart-badge");
          if (badge) {
            badge.textContent = e.newValue || 0;
            badge.classList.add("scale-150");
            setTimeout(() => badge.classList.remove("scale-150"), 300);
          }
        }

        // Tự động load lại danh sách nếu đang đứng ở trang cart.html
        if (
          e.key === "wearever_cart_details" &&
          window.location.pathname.includes("cart.html")
        ) {
          initCartData();
          renderCart();
        }
      });
    </script>
  </body>
</html>
